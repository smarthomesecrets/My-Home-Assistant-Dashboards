            \ {% if is_state('binary_sensor.side_yard_360_person_detected', 'on') %}grayscale(0%) brightness(1){% else %}grayscale(100%)\
            \ brightness(0.8){% endif %} !important;\n  transition: filter 0.8s ease !important;\n}\n"
      camera_image: camera.ai_360_high_resolution_channel
